body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳教大師臣法天奉詔譯如是我聞一時佛在舍衛國祇樹給孤獨園爾時毗沙門天王與百千無數藥叉眷屬於初夜分俱來佛所放大光明照祇陀園一切境界五體投地禮世尊足住立一面合掌向佛以偈讚曰歸命大無畏正覺二足尊諸天以天眼觀我無所見過現未來佛三世慈悲主一一正遍知我今歸命禮爾時毗沙門天王說此偈已白佛言世尊有諸聲聞苾芻苾芻尼優婆塞優婆夷或於曠野林間樹下經行坐臥我此藥叉非人之類有信佛言者有少信之者復有無數諸惡藥叉不信佛言惱亂有情令不安隱善哉世尊所有阿吒曩胝經能為明護若有苾芻苾芻尼優婆塞優婆夷及諸天人受持讀誦禮敬供養廣為人說皆能衛護為作吉祥爾時會中有諸正信藥叉之衆合掌白言唯願天王說此經典我等樂聞時毗沙門天王默然受請即向佛前頭面禮足承佛威神告藥叉言今此經典若有所得宣布流通能除衆生一切煩惱是故我今歸依頂禮東方世界有乾闥婆主名曰持國具大威德身放光明譬如日出普照世間統領眷屬乾闥婆衆恭敬圍繞歌舞作唱而受快樂有九十一子同名帝釋有大勢力勇猛暴惡見佛世尊歸依頂禮尊重恭敬觀此非人而能禮敬彼持國天王守護東方如佛行行如是護世是故我今稽首歸命正遍知明行足無上寂靜南方世界有鳩盤拏主名尾嚕茶迦具大威德身有光明如日照世亦如大海深廣無邊彼諸凡夫不可測度統領眷屬鳩盤拏衆恭敬圍繞歌舞作唱而受快樂有九十一子同名帝釋有大勢力勇猛暴惡見佛世尊歸依頂禮尊重恭敬觀此非人而能禮敬彼鳩盤拏主守護南方如佛行行如是護世是故我今稽首歸命正遍知明行足無上寂靜西方世界有大龍主名尾嚕博叉有大威德光明遠照統領眷屬諸大龍衆恭敬圍繞歌舞作唱而受快樂有九十一子同名帝釋有大勢力勇猛暴惡見佛世尊歸命頂禮尊重恭敬觀此非人而能禮敬彼大龍主守護西方如佛行行如是護世是故我今稽首歸命正遍知明行足無上寂靜北方世界有藥叉名俱吠囉有大威德身光熾盛如大火焰統領眷屬藥叉之衆恭敬圍繞歌舞作唱而受快樂有九十一子同名帝釋有大勢力勇猛暴惡見佛世尊歸依頂禮尊重恭敬觀此非人而能禮敬彼藥叉主守護北方如佛行行如是護世是故我今稽首歸命正遍知明行足無上寂靜復次北方世界人壽千歲命不中夭地無耕種人不執作飲食自然色香具足資益諸根身體光潤處處皆有花果樹木流泉池沼隨意遊戲如受天樂如是東方持國南方尾嚕茶迦西方尾嚕博叉北方俱吠囉各以威德護四大洲復次乾闥婆主有藥叉女衆有乘象者有乘馬者有乘駝者有乘水牛者有乘羊者有乘蛇者有乘飛禽者有乘童男者有乘童女者以象前引於虛空中密詣諸方種種變化隨意自在亦能守護人不可見若諸藥叉形容醜惡種種差異亦如飛禽往虛空中自在遊行亦密護人其名曰阿吒曩吒俱曩吒波里俱娑曩吒曩拏曩拏布里迦等及藥叉女衆皆住北方阿拏迦嚩帝大城又此大城有一宮殿於其四邊有九十九池水甚深廣名曰地池泉源通流亦能降雨復有多種花果樹木所謂供俱婆迦俱囉囉迦麼花等果味甘美衆所愛樂頻伽孔雀種種諸鳥常出妙音彼有天子名曰勇猛并諸眷屬亦住是宮守護國界時毗沙門天王承佛慈力次第宣說真言曰怛儞也二合他引伊梨彌梨伊隸緊吒母隸呬隸緊致母隸賀那彌護努里努二合彌矯里巘馱引里虞努呬儞烏枳護枳娑嚩二合引賀引爾時毗沙門天王說真言已白佛言世尊復有諸大乾闥婆衆與我而為兄弟其名曰欲麼覩樂麼覩歌麼多麼羅麼覩麼度麼多花醉恆醉吉祥醉財醉難禰迦青蓮華白蓮華月半尼羅俱枳羅成凍母嚕五髻妙色金麼拏尾輸俱蜜里二合賀娑波二合帝王野嚩帝惹誐覩誐帝如是等乾闥婆衆迷惑惱亂一切衆生若有惱亂有情而不捨離者聞此真言頭破作七分如阿梨樹枝真言曰怛儞也二合他引供覩梨供覩羅曀呬娑那引曼底計娑那伴尼底計底瑟吒二合努瑟吒二合滿度細娑嚩二合引賀引世尊若有聲聞苾芻苾芻尼優婆塞優婆夷於此經中受持讀誦禮敬供養廣為人說彼乾闥婆及父母兄弟男女眷屬等皆不能為害常來親近侍奉衛護若有惱害者即失威力不得乾闥婆三昧頭破作七分如阿梨樹枝亦不得往阿拏迦嚩帝大城中住世尊若有聲聞苾芻苾芻尼優婆塞優婆夷於此經中受持讀誦禮敬供養廣為人說彼閉舍左及父母兄弟男女眷屬等皆不能為害常來親近侍奉衛護若有惱害者即失威力不得閉舍左三昧頭破作七分如阿梨樹枝亦不得往阿拏迦嚩帝大城中住真言曰怛儞也二合他引護彌引護彌引護彌羅引嚩帝曳引娑嚩二合引賀引世尊復有鳩盤拏衆其名曰難多烏波難多訖里二合計輸麼賀波囉輸二合摩斛那囉捺舍賀娑覩二合部彌左嚕末麼訖里二合瑟拏二合路呬多阿婆囉嚩囉拏尾麼路禰里伽二合囉拏誐里惹曩惹致路捺舍難尼阿里祖二合諾迦麼迦麼迦曀羅巘拏訖里二合野虞般多怛囉野二合劍末羅跋捺里二合迦薩里嚩二合囕誐唧怛囉二合芻等如是鳩盤拏衆迷惑惱亂一切有情若有惱亂者聞此真言頭破作七分如阿梨樹枝真言曰怛儞也二合他引悉里尾悉里悉里尾悉里訖里二合瑟拏二合蹉誐隸迦囉尼卑孕二合誐隸娑嚩二合引賀引世尊若有聲聞苾芻苾芻尼優婆塞優婆夷於此經中受持讀誦禮敬供養廣為人說彼鳩盤拏衆及父母兄弟男女眷屬等皆不能為害常來親近侍奉衛護若有惱害者即失威力不能鳩盤拏三昧頭破作七分如阿梨樹枝亦不得往阿拏迦嚩帝大城中住世尊若有聲聞苾芻苾芻尼優婆塞優婆夷於此經中受持讀誦禮敬供養廣為人說彼必隸多及彼父母兄弟男女眷屬等皆不能為害常來親近侍奉供養若有惱害者即失威力不得必隸多三昧頭破作七分如阿梨樹枝亦不得往阿拏迦嚩帝大城中住真言曰怛儞也二合他引喻彌喻彌隸喻彌羅嚩帝曳娑嚩二合引賀引世尊我今復說諸大龍衆其名曰難努波難努難禰嚩嚩穌計里跋捺囉二合惹敢二合迦卑孕二合誐路那地迦囉拏印捺囉二合嚩護莎悉帝二合迦阿輸俱彌多輸迦尾鉢囉二合目訖覩惹焰鉢帝必里二合免多羅唧怛囉二合多羅必里二合兔𤚥唧怛囉二合鉢囉二合賀嚩𡁠麼賀頗尼所二合惹喻底囉穌麼賀訖里瑟拏部惹敢二合誐麼阿惹播羅怛乞叉二合嚩摩訖里二合瑟拏二合舍野摩秫俱二合乃至世間行者如是龍等惱亂有情聞此真言頭破作七分如阿梨樹枝真言曰怛儞也二合他引唧隸尾唧隸唧隸尾唧隸虞里巘馱里摩鄧霓贊拏引隸娑嚩二合引賀引世尊若有聲聞苾芻苾芻尼優婆塞優婆夷於此經中受持讀誦禮敬供養廣為人說彼諸龍衆及彼父母兄弟男女眷屬等皆不能為害常來親近侍奉衛護若有惱害者即失威力不得龍中三昧頭破作七分如阿梨樹枝亦不得往阿拏迦嚩帝大城中住世尊若有聲聞苾芻苾芻尼優婆塞優婆夷於此經中受持讀誦禮敬供養廣為人說彼羯吒布怛曩及彼父母兄弟男女眷屬等皆不能為害常來親近侍奉供養若有惱害者即失威力不得羯吒布怛曩三昧頭破作七分如阿梨樹枝亦不能往阿拏迦嚩帝大城中住真言曰怛儞也二合他引阿閉嚩賀儞引嚩帝曳引娑嚩二合引賀引世尊我今說彼藥叉大將其名曰印捺囉二合穌謨嚩嚕拏鉢囉二合惹鉢帝婆羅捺嚩惹伊舍曩室左二合難曩迦麼室里瑟姹俱儞建跓儞軍吒摩尼里摩尼里摩尼左囉鉢囉二合拏那烏波半左迦娑多擬里呬麼嚩多布囉拏佉禰囉俱尾吒虞波羅野叉阿吒嚩俱曩囉囉祖𡁠那里沙婆唧怛囉二合細曩巘馱里舞二合禰里伽二合舍訖帝二合摩多隸半左羅巘拏穌摩曩禰里伽二合野叉并諸眷屬帝里二合頗隸左帝里二合建吒等乃至世間行者俱是眷屬若惱亂有情而不捨離者聞此真言頭破作七分如阿梨樹枝真言曰怛儞也二合他引呬隸彌隸呬彌隸吉里帝二合引母隸呬隸吉里帝二合母隸唵凍彌引凍彌引烏凍麼烏凍彌引烏企彌企虞引努引呬引部凌二合誐里乙里二合史散多儞娑嚩二合引賀引世尊若有聲聞苾芻苾芻尼優婆塞優婆夷於此經中受持讀誦禮敬供養廣為人說彼諸藥叉及彼父母兄弟男女眷屬等皆不能為害若有惱亂者即失威力不能得藥叉三昧頭破作七分如阿梨樹枝亦不能往阿拏迦嚩帝大城中住世尊若有聲聞苾芻苾芻尼優婆塞優婆夷於此經中受持讀誦禮敬供養廣為人說彼諸羅剎及彼父母兄弟男女眷屬等皆不能為害常來親近侍奉供養若有惱亂者即失威力不能得羅剎三昧頭破作七分如阿梨樹枝亦不能往阿拏迦嚩帝大城中住真言曰怛儞也二合他呬隸呬隸護嚕護嚕喻彌喻彌羅嚩帝曳引娑嚩二合引賀引毗沙門天王說此阿吒曩胝經已禮世尊足却住一面爾時釋迦牟尼佛於夜分中告苾芻衆言如是此經有大威力能為明護彼毗沙門天王與無數百千藥叉眷屬放大光明照祇陀園一切境界說伽他曰歸命大無畏正覺二足尊諸天以天眼觀我無所見過去未來佛三世慈悲主一一正遍知我今歸命禮說此偈已而白佛言有諸聲聞苾芻苾芻尼優婆塞優婆夷於曠野林間樹下經行坐臥有諸藥叉非人之類有信佛言者有少信者有極惡不信者惱亂有情令不安隱說此經典利樂衆生汝諸苾芻諦聽諦聽此經真實有大威力能為救護乃至天人常得密護汝當受持廣宣流布說是語已天龍藥叉人非人等皆大歡喜信受奉行
